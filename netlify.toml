[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin", "firebase"]

# Scheduled function to send queued pushes every 5 minutes
[functions."push-cron"]
  schedule = "*/5 * * * *"
